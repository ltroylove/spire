<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    /* Minimal dark background matching the eq-window context */
    body { background: #0b0b10; margin: 0; padding: 20px; font-family: sans-serif; font-size: 13px; }

    /* ---- eq-ui-buttons.css (source of truth, kept in sync) ---- */
    [class|="eq-window"] button:not(.close) {
      display: inline-block; text-align: center;
      background: linear-gradient(180deg, #4b4b63, #1f1f31);
      border: 1px solid #000000; border-radius: 4px;
      color: #ffffff; cursor: pointer;
    }
    [class|="eq-window"] button:not(.btn):not(.close) {
      padding: .5rem .75rem; font-size: .9375rem; line-height: 1.5;
    }
    [class|="eq-window"] button:hover:not(:disabled) {
      opacity: 1 !important; box-shadow: inset 0 0 7px white;
      color: #ffffff; text-decoration: none;
      background-color: rgba(204,204,204,0.08);
      border: 1px solid rgb(204,204,204);
    }

    /* Outline variants — these are the ones we fixed */
    [class|="eq-window"] button.btn-outline-primary {
      background: none; color: #8888c0; border: 1px solid #8888c0;
      box-shadow: inset 0 0 4px rgba(255,255,255,0.2);
    }
    [class|="eq-window"] button.btn-outline-secondary {
      background: none; color: #9aacbe; border: 1px solid #9aacbe;
      box-shadow: inset 0 0 4px rgba(255,255,255,0.2);
    }
    [class|="eq-window"] button.btn-outline-success {
      background: none; color: #5aaa5a; border: 1px solid #5aaa5a;
      box-shadow: inset 0 0 4px rgba(255,255,255,0.2);
    }
    [class|="eq-window"] button.btn-outline-danger {
      background: none; color: #cc5555; border: 1px solid #cc5555;
      box-shadow: inset 0 0 4px rgba(255,255,255,0.2);
    }
    [class|="eq-window"] button.btn-outline-warning {
      background: none; color: #d4a830; border: 1px solid #d4a830;
      box-shadow: inset 0 0 4px rgba(255,255,255,0.2);
    }
    [class|="eq-window"] button.btn-outline-info {
      background: none; color: #4aa8c8; border: 1px solid #4aa8c8;
      box-shadow: inset 0 0 4px rgba(255,255,255,0.2);
    }

    /* minified-inputs height rule */
    .minified-inputs input, .minified-inputs select {
      margin-top: 6px; margin-bottom: 6px; height: 30px;
    }
    .minified-inputs .input-group .btn,
    .minified-inputs .d-flex > .btn {
      height: 30px;
      box-sizing: border-box;
    }

    /* Bootstrap global box-sizing reset (matches Bootstrap 4 behaviour in the real app) */
    *, *::before, *::after { box-sizing: border-box; }

    /* Bootstrap-like helpers */
    .btn { display: inline-block; padding: .25rem .5rem; font-size: .875rem; line-height: 1.5; border: 1px solid transparent; border-radius: .2rem; }
    .btn-sm { padding: .25rem .5rem; font-size: .875rem; }
    .input-group { position: relative; display: flex; flex-wrap: wrap; align-items: stretch; width: 100%; }
    .input-group input { position: relative; flex: 1 1 auto; width: 1%; min-width: 0; }
    .input-group-append { display: flex; margin-left: -1px; }
    .d-flex { display: flex; }
    .align-items-center { align-items: center; }
    .gap-1 { gap: 4px; }
    input { height: 30px; box-sizing: border-box; border: 1px solid #555; background: #0b0b10; color: #fff; padding: 5px; font-size: 13px; }
  </style>
</head>
<body>

  <!-- Simulated eq-window-simple context -->
  <div class="eq-window-simple" style="background: #12121c; padding: 16px; border-radius: 4px;">

    <!-- Action bar outline buttons -->
    <div id="action-bar" style="display:flex; gap:8px; margin-bottom:16px;">
      <button class="btn btn-outline-warning btn-sm" id="btn-warning">Save All</button>
      <button class="btn btn-outline-secondary btn-sm" id="btn-secondary">Discard</button>
      <button class="btn btn-outline-info btn-sm" id="btn-info">Clone</button>
      <button class="btn btn-outline-danger btn-sm" id="btn-danger">Delete</button>
      <button class="btn btn-outline-success btn-sm" id="btn-success">New</button>
      <button class="btn btn-outline-primary btn-sm" id="btn-primary">Primary</button>
    </div>

    <!-- Input + button (d-flex) height test -->
    <div class="minified-inputs" style="margin-bottom:16px;">
      <div class="d-flex align-items-center gap-1" id="flex-row">
        <input type="text" placeholder="Rank ID" style="flex:1"/>
        <button class="btn btn-outline-info btn-sm" id="search-btn">&#x1F50D;</button>
      </div>
    </div>

    <!-- Input-group height test -->
    <div class="minified-inputs">
      <div class="input-group" id="input-group-row">
        <input type="text" placeholder="Title SID"/>
        <div class="input-group-append">
          <a class="btn btn-warning btn-sm" id="editor-link" href="#">Editor</a>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
